name: Deploy to Hostinger (FTP)

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: Test FTP connection
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET: ${{ secrets.FTP_TARGET }}
        run: |
          set -euxo pipefail
          if [ -z "${FTP_HOST:-}" ] || [ -z "${FTP_USER:-}" ] || [ -z "${FTP_PASS:-}" ]; then
            echo "Required FTP secrets are missing (FTP_HOST/FTP_USERNAME/FTP_PASSWORD)." >&2
            exit 3
          fi
          echo "Testing connection to $FTP_HOST as $FTP_USER"
          # Quick open/close to check credentials and reachability
          lftp -c "open -u $FTP_USER,$FTP_PASS $FTP_HOST; pwd; bye" || (
            echo "FTP connection test failed. Check host, username, password, and that Hostinger allows connections from GitHub Actions runners." >&2; exit 4)

      - name: Deploy via lftp
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_TARGET: ${{ secrets.FTP_TARGET }}
        run: |
          set -euxo pipefail
          echo "Starting lftp deploy to $FTP_HOST -> $FTP_TARGET"
          # Use plain FTP by default. If you prefer FTPS/SFTP, update settings accordingly.
          # Try FTPS first (secure), fall back to plain FTP if login fails.
          echo "Attempting FTPS (secure) first..."
          lftp -c "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; open -u $FTP_USER,$FTP_PASS $FTP_HOST; pwd; bye" >/tmp/ftptest 2>&1 || true
          if grep -qi "530" /tmp/ftptest || grep -qi "Login failed" /tmp/ftptest; then
            echo "FTPS login failed, trying plain FTP fallback..."
            # Try plain FTP mirror (no SSL)
            lftp -c "set ftp:ssl-force false; set ftp:ssl-protect-data false; open -u $FTP_USER,$FTP_PASS $FTP_HOST; \
              mirror -R --parallel=2 --delete --verbose \
                --exclude-glob server/** \
                --exclude-glob e2e/** \
                --exclude-glob sql/** \
                --exclude-glob data/** \
                --exclude-glob node_modules/** \
                --exclude-glob playwright-report/** \
                --exclude-glob test-results/** \
                --exclude-glob api/config.local.php ./ $FTP_TARGET"
          else
            echo "FTPS login succeeded; running secure mirror..."
            lftp -c "set ssl:verify-certificate no; set ftp:ssl-force true; set ftp:ssl-protect-data true; open -u $FTP_USER,$FTP_PASS $FTP_HOST; \
              mirror -R --parallel=2 --delete --verbose \
                --exclude-glob server/** \
                --exclude-glob e2e/** \
                --exclude-glob sql/** \
                --exclude-glob data/** \
                --exclude-glob node_modules/** \
                --exclude-glob playwright-report/** \
                --exclude-glob test-results/** \
                --exclude-glob api/config.local.php ./ $FTP_TARGET"
          fi
