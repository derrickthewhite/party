<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Party</title>
  <style>
    :root {
      --bg-1: #f7f4ef;
      --bg-2: #f0e8da;
      --card: #fffdf8;
      --ink: #1f2528;
      --muted: #566168;
      --accent: #d04a2a;
      --accent-2: #2f7d8c;
      --line: #ded4c4;
      --success: #2d7d57;
      --danger: #a22727;
      --radius: 14px;
      --shadow: 0 10px 30px rgba(43, 36, 21, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(1000px 600px at 10% -20%, #fff8e6 0%, transparent 60%),
        radial-gradient(800px 500px at 100% 0%, #e6f7fb 0%, transparent 55%),
        linear-gradient(180deg, var(--bg-1), var(--bg-2));
      min-height: 100vh;
    }

    #app {
      max-width: 980px;
      margin: 0 auto;
      padding: 20px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .column {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    h1, h2, h3 {
      margin: 0 0 8px;
      line-height: 1.2;
    }

    p {
      margin: 0;
      color: var(--muted);
    }

    input, button, select {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--line);
      padding: 10px 12px;
    }

    input, select {
      width: 100%;
      background: #fff;
    }

    button {
      cursor: pointer;
      background: #fff;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    button.secondary {
      background: var(--accent-2);
      color: #fff;
      border-color: var(--accent-2);
    }

    button.link {
      border: none;
      background: transparent;
      color: var(--accent);
      padding: 6px;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .hidden {
      display: none !important;
    }

    .screen {
      animation: fade-in 180ms ease;
    }

    @keyframes fade-in {
      from { opacity: 0; transform: translateY(5px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message-feed {
      height: 320px;
      overflow-y: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    .message-item {
      margin-bottom: 10px;
      padding-bottom: 8px;
      border-bottom: 1px dashed #eadfce;
    }

    .message-item:last-child {
      border-bottom: none;
      margin-bottom: 0;
    }

    .status {
      min-height: 22px;
      color: var(--muted);
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--success); }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 10px;
    }

    .game-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: #fff;
    }

    @media (max-width: 760px) {
      #app { padding: 14px; }
      .row.mobile-stack { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>
<body>
  <main id="app"></main>
  <script type="module" src="js/app.js"></script>
</body>
</html>
